<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendario preferiti · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.cal-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.cal-wrap{margin-top:18px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow);padding:18px}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calnav b{font-size:18px;font-family:var(--f-display);text-transform:capitalize}
.calnav button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.calnav button:hover:not(:disabled){background:var(--panel2)}
.calnav button:disabled{opacity:.35;cursor:default}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.calhead span{text-align:center;font-size:11px;font-weight:700;color:var(--muted)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{aspect-ratio:1/1;border-radius:10px;border:1px solid var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;position:relative;background:#fff;min-height:52px}
.cell.blank{border:0;background:transparent;cursor:default}
.cell.past{background:#f7f7f7;color:#cfcfcf;cursor:default}
.cell .dnum{font-size:13px;font-weight:600}
.cell .cnt{font-size:11px;font-weight:800;padding:1px 6px;border-radius:10px}
.cell.free .cnt{background:#eafaf0;color:#0a7d38}
.cell.some .cnt{background:#fff5e6;color:#a86a00}
.cell.none .cnt{background:#fbeaef;color:#c0395e}
.cell.sel{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand) inset}
.callegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted)}
.callegend .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.callegend .dot.free{background:#7ed6a2}.callegend .dot.some{background:#f0c069}.callegend .dot.none{background:#f3b9c8}
.day-detail{margin-top:18px}
.day-detail h3{font-family:var(--f-display);margin:0 0 10px}
.dd-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.dd-item{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;text-decoration:none;color:inherit}
.dd-photo{width:42px;height:42px;border-radius:10px;overflow:hidden;flex:none;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:19px}
.dd-photo img{width:100%;height:100%;object-fit:cover}
.dd-name{font-weight:700;min-width:0;flex:1}
.dd-name .m{font-size:12px;color:var(--muted);font-weight:400}
.dd-st{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;flex:none}
.dd-st.free{background:#eafaf0;color:#0a7d38}.dd-st.busy{background:#fbeaef;color:#c0395e}.dd-st.na{background:var(--panel2);color:var(--muted)}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<main class="container section">
  <div class="cal-head">
    <div>
      <h1 class="title" style="margin-bottom:2px">Calendario preferiti</h1>
      <p class="sub">Le disponibilità e gli impegni di tutti i tuoi artisti preferiti, in un colpo d'occhio.</p>
    </div>
    <a class="btn ghost" href="/preferiti.html" data-ic="heart" data-ic-size="15">Torna ai preferiti</a>
  </div>

  <div id="empty" class="empty" style="display:none">
    Non hai ancora preferiti.<br>
    <a class="btn ghost sm" style="margin-top:14px" href="/">Sfoglia gli artisti</a> e tocca il cuore per salvarli.
  </div>

  <div class="cal-wrap" id="calWrap" style="display:none">
    <div class="calnav">
      <button id="prevBtn" onclick="calNav(-1)" aria-label="Mese precedente">‹</button>
      <b id="calTitle"></b>
      <button onclick="calNav(1)" aria-label="Mese successivo">›</button>
    </div>
    <div class="calhead" id="calHead"></div>
    <div class="calgrid" id="calGrid"></div>
    <div class="callegend">
      <span><i class="dot free"></i>Tutti liberi</span>
      <span><i class="dot some"></i>Alcuni occupati</span>
      <span><i class="dot none"></i>Nessuno libero</span>
      <span style="color:var(--muted)">n.d. = calendario non impostato</span>
    </div>
    <div class="day-detail" id="dayDetail"></div>
  </div>
</main>

<script src="/assets/api.js"></script>
<script>
const MESI_FULL=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GG=['L','M','M','G','V','S','D'];
let FAV=[];               // artisti preferiti (con busy[])
let BUSY={};              // user_id -> Set(date)
let calY, calM, selDate=null;

function isoOf(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

async function init(){
  const me = await getMe(true);
  if(!me.user){ location.href='/accedi.html'; return; }
  if(!['promoter','management','admin'].includes(me.user.role)){ location.href='/'; return; }
  await renderNav();
  injectIcons();
  let r;
  try{ r = await api('favorites-list.php'); }
  catch(err){ toast(errMsg(err),true); return; }
  FAV = r.artists||[];
  if(!FAV.length){ document.getElementById('empty').style.display='block'; return; }
  FAV.forEach(a=>{ BUSY[a.user_id]=new Set(a.busy||[]); });
  document.getElementById('calWrap').style.display='block';
  const t=new Date(); calY=t.getFullYear(); calM=t.getMonth();
  document.getElementById('calHead').innerHTML=GG.map(g=>`<span>${g}</span>`).join('');
  draw();
}

/* stato di un artista in una data: 'na' (no calendario), 'busy' (occupato), 'free' */
function statusOn(a,iso){ if(!a.has_calendar) return 'na'; return BUSY[a.user_id].has(iso)?'busy':'free'; }
/* conteggio liberi tra chi HA un calendario */
function freeCount(iso){
  let withCal=0, free=0;
  FAV.forEach(a=>{ if(!a.has_calendar) return; withCal++; if(!BUSY[a.user_id].has(iso)) free++; });
  return {withCal, free};
}

function draw(){
  document.getElementById('calTitle').textContent=`${MESI_FULL[calM]} ${calY}`;
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('prevBtn').disabled = (new Date(calY,calM,1) <= new Date(today.getFullYear(),today.getMonth(),1));
  const first=new Date(calY,calM,1); const startDow=(first.getDay()+6)%7;
  const days=new Date(calY,calM+1,0).getDate();
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cell blank"></div>`;
  for(let d=1;d<=days;d++){
    const date=new Date(calY,calM,d); const iso=isoOf(calY,calM,d);
    if(date<today){ cells+=`<div class="cell past"><span class="dnum">${d}</span></div>`; continue; }
    const {withCal,free}=freeCount(iso);
    let cls='free', label;
    if(withCal===0){ cls=''; label='<span class="cnt" style="background:var(--panel2);color:var(--muted)">n.d.</span>'; }
    else { cls = free===withCal?'free':(free===0?'none':'some');
      label=`<span class="cnt">${free}/${withCal}</span>`; }
    const sel = selDate===iso?' sel':'';
    cells+=`<div class="cell ${cls}${sel}" onclick="pick('${iso}')"><span class="dnum">${d}</span>${label}</div>`;
  }
  document.getElementById('calGrid').innerHTML=cells;
  drawDetail();
}
function calNav(delta){ calM+=delta; if(calM<0){calM=11;calY--} if(calM>11){calM=0;calY++} draw(); }
function pick(iso){ selDate = selDate===iso?null:iso; draw(); }

function drawDetail(){
  const box=document.getElementById('dayDetail');
  if(!selDate){ box.innerHTML=`<p class="hint">Tocca un giorno per vedere chi è libero e chi è impegnato.</p>`; return; }
  const d=new Date(selDate+'T00:00:00');
  const items=FAV.map(a=>{
    const st=statusOn(a,selDate);
    const lbl=st==='free'?'Libero':st==='busy'?'Occupato':'n.d.';
    const loc=[a.comune,a.provincia?('('+a.provincia+')'):''].filter(Boolean).join(' ');
    return {a,st,order:st==='free'?0:st==='busy'?1:2,html:`
      <a class="dd-item" href="/${esc(a.slug||'')}">
        <div class="dd-photo">${a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:'🎵'}</div>
        <div class="dd-name">${esc(a.stage_name||'Artista')}${a.verified?'<span class="vchk">✓</span>':''}<div class="m">${esc(showLabel(a.formazione))}${loc?' · '+esc(loc):''}</div></div>
        <span class="dd-st ${st==='free'?'free':st==='busy'?'busy':'na'}">${lbl}</span>
      </a>`};
  }).sort((x,y)=>x.order-y.order);
  const freeN=items.filter(i=>i.st==='free').length;
  box.innerHTML=`<h3>${d.getDate()} ${MESI_FULL[d.getMonth()]} ${d.getFullYear()} · ${freeN} liber${freeN===1?'o':'i'}</h3>
    <div class="dd-list">${items.map(i=>i.html).join('')}</div>`;
}
init();
</script>
</body>
</html>
